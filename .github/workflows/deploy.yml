name: 자동 빌드 및 배포 (Deploy to GitHub Pages)

on:
  push:
    branches:
      - main # main 브랜치에 코드가 올라올 때마다 실행

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 내 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 파이썬 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 3. data.js 자동 생성 (build.py 실행)
        run: python build.py

      - name: 4. GitHub Pages로 최종 배포
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # 배포 전용 브랜치 자동 생성
          folder: . # 현재 폴더 전체를 배포