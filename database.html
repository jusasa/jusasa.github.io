                <!-- Content Will Be Injected Here -->
            </div>

            <!-- Right: SQL Playground -->

                <!-- SQL Editor -->
                <div class="relative h-1/2 md:h-2/5 shrink-0 border-b border-gray-200 bg-gray-50 flex flex-col">

                            (교재 CH05의 학생, 수강, 과목 테이블이 기본 생성되어 있습니다.)

    </div>

    <script>
        // --- 아이콘 SVG ---
        const icons = {
            db: `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>`,

            terminal: `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>`,
            check: `<svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
            checkLarge: `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
            alert: `<svg class="w-5 h-5 shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
            info: `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`
        };

        // --- 데이터베이스 교재 내용 ---
        const studyMaterials = [
            {
                id: 'ch01',
                title: 'CH01. 데이터베이스 개념',
                icon: icons.db,
                content: `
                <div class="space-y-4 text-gray-800">
                    <h2 class="text-2xl font-bold text-blue-800">데이터베이스 개념</h2>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">데이터 vs 정보</h3>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>데이터 (Data):</strong> 현실 세계에서 관찰이나 측정을 통해 수집된 순수한 사실이나 값</li>
                            <li><strong>정보 (Information):</strong> 데이터를 의사결정에 활용할 수 있도록 가공/처리한 결과물</li>
                        </ul>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">데이터베이스의 4가지 정의</h3>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>공용 데이터:</strong> 여러 사용자나 응용 프로그램이 공동으로 소유</li>
                            <li><strong>통합 데이터:</strong> 중복을 최소화하여 하나로 통합</li>
                            <li><strong>운영 데이터:</strong> 조직 운영을 위해 필수적인 데이터</li>
                            <li><strong>저장 데이터:</strong> 컴퓨터가 접근 가능한 매체에 디지털화되어 저장</li>
                        </ul>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">주요 특성</h3>
                        <ul class="list-disc pl-5 space-y-2">
                            <li>실시간 접근 (Real-time Accessibility)</li>
                            <li>끊임없는 변화 (Continuous Evolution)</li>
                            <li>동시 공용 (Concurrent Sharing)</li>
                            <li>내용에 의한 참조 (Content-based Referencing)</li>
                        </ul>
                    </div>
                </div>`
            },
            {
                id: 'ch02',
                title: 'CH02. 데이터베이스 시스템',
                icon: icons.network,
                content: `
                <div class="space-y-4 text-gray-800">
                    <h2 class="text-2xl font-bold text-blue-800">데이터베이스 시스템 (DBS)</h2>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">데이터베이스 언어</h3>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>DDL (데이터 정의어):</strong> DB 구조, 스키마 정의 (CREATE, ALTER, DROP)</li>
                            <li><strong>DML (데이터 조작어):</strong> 데이터 검색, 삽입, 수정, 삭제 (SELECT, INSERT, UPDATE, DELETE)</li>
                            <li><strong>DCL (데이터 제어어):</strong> 보안, 권한 제어 (GRANT, REVOKE)</li>
                        </ul>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">ANSI/SPARC 3단계 스키마</h3>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>외부 스키마:</strong> 개별 사용자 관점 (뷰)</li>
                            <li><strong>개념 스키마:</strong> 조직 전체 관점 (통합 논리 구조)</li>
                            <li><strong>내부 스키마:</strong> 물리적 저장 장치 관점</li>
                        </ul>
                        <div class="mt-3 p-3 bg-blue-50 text-blue-900 rounded border border-blue-200">
                            <strong>핵심 목적:</strong> 스키마 간 사상(Mapping)을 통해 응용 프로그램과 구조를 분리하는 <strong>데이터 독립성</strong> 제공
                        </div>
                    </div>
                </div>`
            },
            {
                id: 'ch03',
                title: 'CH03. 관계형 데이터 모델',
                icon: icons.layout,
                content: `
                <div class="space-y-4 text-gray-800">
                    <h2 class="text-2xl font-bold text-blue-800">관계형 데이터 모델 (RDM)</h2>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">릴레이션 구조</h3>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>속성 (Attribute):</strong> 열(Column). 총 개수 = <strong>차수(Degree)</strong></li>
                            <li><strong>투플 (Tuple):</strong> 행(Row). 총 개수 = <strong>카디널리티(Cardinality)</strong></li>
                            <li><strong>도메인 (Domain):</strong> 속성이 가질 수 있는 값들의 집합</li>
                        </ul>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">키(Key)와 무결성 제약조건</h3>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>후보키:</strong> 유일성 + 최소성 만족</li>
                            <li><strong>기본키 (Primary Key):</strong> 후보키 중 대표. <strong>개체 무결성</strong> (NULL/중복 불가)</li>
                            <li><strong>외래키 (Foreign Key):</strong> 다른 릴레이션 참조. <strong>참조 무결성</strong></li>
                        </ul>
                    </div>
                </div>`
            },
            {
                id: 'ch04',
                title: 'CH04. 관계 대수',
                icon: icons.code,
                content: `
                <div class="space-y-4 text-gray-800">
                    <h2 class="text-2xl font-bold text-blue-800">관계 대수 (Relational Algebra)</h2>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">필수 5대 연산</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="p-3 bg-gray-50 rounded text-sm">
                                <strong class="text-blue-600">합집합 (∪), 차집합 (-)</strong>
                            </div>
                            <div class="p-3 bg-gray-50 rounded text-sm">
                                <strong class="text-blue-600">카티션 프로덕트 (×)</strong><br/>모든 투플 조합 생성
                            </div>
                            <div class="p-3 bg-gray-50 rounded text-sm">
                                <strong class="text-purple-600">셀렉트 (σ)</strong><br/>조건 만족 투플 추출 (수평 분할)
                            </div>
                            <div class="p-3 bg-gray-50 rounded text-sm">
                                <strong class="text-purple-600">프로젝트 (π)</strong><br/>특정 속성 추출 (수직 분할)
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2">확장 조인 연산</h3>
                        <ul class="list-disc pl-5 space-y-2 text-sm">
                            <li><strong>동등 조인 (Equi Join):</strong> '=' 연산자로 결합</li>
                            <li><strong>자연 조인 (Natural Join):</strong> 중복 속성 자동 제거</li>
                            <li><strong>외부 조인 (Outer Join):</strong> 조인에 실패한 투플도 널(NULL)로 채워 모두 반환 (LEFT, RIGHT, FULL)</li>
                        </ul>
                    </div>
                </div>`
            },
            {
                id: 'ch05',
                title: 'CH05. SQL 기초 (MySQL 기준)',
                icon: icons.terminal,
                content: `
                <div class="space-y-4 text-gray-800">
                    <h2 class="text-2xl font-bold text-blue-800">MySQL 데이터 조작문 가이드</h2>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2 text-indigo-700">1. 기본 검색 및 조인 (SELECT)</h3>
                        <pre class="bg-gray-800 text-green-400 p-3 rounded text-sm overflow-x-auto"><code>-- 조건 검색
SELECT 이름, 학년 FROM 학생 
WHERE 소속학과 = '컴퓨터' ORDER BY 학년 DESC;

-- LIKE 연산자
SELECT * FROM 학생 WHERE 이름 LIKE '김%';

-- 내부 조인
SELECT 학생.이름, 수강.기말성적
FROM 학생 JOIN 수강 ON 학생.학번 = 수강.학번;</code></pre>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2 text-indigo-700">2. 그룹화 및 부 질의문</h3>
                        <pre class="bg-gray-800 text-green-400 p-3 rounded text-sm overflow-x-auto"><code>-- GROUP BY와 HAVING
SELECT 소속학과, COUNT(*) as 학생수
FROM 학생 GROUP BY 소속학과 HAVING COUNT(*) >= 2;

-- 부 질의문 (수강 기록이 있는 학생의 이름 검색)
SELECT 이름 FROM 학생 
WHERE 학번 IN (SELECT 학번 FROM 수강 WHERE 평가학점 = 'A');</code></pre>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold mb-2 text-indigo-700">3. 삽입/수정/삭제 (INSERT/UPDATE/DELETE)</h3>
                        <pre class="bg-gray-800 text-green-400 p-3 rounded text-sm overflow-x-auto"><code>-- 데이터 삽입

-- 수정 (UPDATE)
UPDATE 학생 SET 학년 = 3 WHERE 이름 = '이은진';

-- 삭제 (DELETE)
DELETE FROM 학생 WHERE 소속학과 = '경영';</code></pre>
                    </div>

        // --- SQL 초기화 데이터 (MySQL 표준 타입인 VARCHAR, INT, DATE 사용) ---
        const initSQL = `
            CREATE TABLE 학생 (
                학번 VARCHAR(20), 
                이름 VARCHAR(30), 
                주소 VARCHAR(100), 
                학년 INT, 
                나이 INT, 
                성별 VARCHAR(10), 
                휴대폰번호 VARCHAR(30), 
                소속학과 VARCHAR(50)
            );

        // --- 상태 변수 ---
        let db = null;
        let activeTab = 'ch01';

        // --- DOM 엘리먼트 ---
        const navList = document.getElementById('nav-list');
        const headerTitle = document.getElementById('header-title');
        const studyContent = document.getElementById('study-content');
        const dbStatus = document.getElementById('db-status');
        const runBtn = document.getElementById('run-btn');
        const sqlInput = document.getElementById('sql-input');
        const resultsContainer = document.getElementById('results-container');

        // --- 초기화 함수 ---
        function initApp() {
            renderNav();
            setTab(activeTab);
            sqlInput.value = "SELECT * FROM 학생;\n-- 본 시스템은 MySQL 표준 문법을 호환하여 실행됩니다.";

            // SQL.js 로딩 및 데이터베이스 초기화
            initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/${file}` })
                .then(function(SQL){
                    try {
                        db = new SQL.Database();
                        db.run(initSQL);
                        
                        // 성공적으로 준비됨
                        dbStatus.innerHTML = `<span class="flex items-center gap-1 text-green-400">${icons.check} Web SQL Ready (MySQL Syntax)</span>`;
                        runBtn.disabled = false;
                    } catch(err) {
                        showError('DB 초기화 오류: ' + err.message);
                    }
                })
                .catch(function(err){
                    showError('엔진 로드 오류: ' + err.message);
                });

            // 실행 버튼 이벤트
            runBtn.addEventListener('click', executeSql);
        }

        // --- 네비게이션 렌더링 ---
        function renderNav() {
            navList.innerHTML = '';
            studyMaterials.forEach(item => {
                const li = document.createElement('li');
                li.className = 'w-auto md:w-full shrink-0';
                
                const btn = document.createElement('button');
                btn.onclick = () => setTab(item.id);
                
                const isActive = activeTab === item.id;
                btn.className = `w-full flex items-center gap-3 px-4 md:px-5 py-3 text-sm transition-colors rounded md:rounded-none whitespace-nowrap ${
                    isActive 
                        ? 'bg-blue-600 text-white md:border-r-4 md:border-blue-400' 
                        : 'text-slate-300 hover:bg-slate-800 hover:text-white'
                }`;
                
                btn.innerHTML = `${item.icon} <span class="hidden md:inline">${item.title}</span><span class="md:hidden">${item.title.split('.')[0]}</span>`;
                
                li.appendChild(btn);
                navList.appendChild(li);
            });
        }

        // --- 탭 변경 로직 ---
        function setTab(id) {
            activeTab = id;
            renderNav(); // Update active state
            
            const tabData = studyMaterials.find(item => item.id === id);
            if(tabData) {
                headerTitle.innerHTML = `${tabData.icon} ${tabData.title}`;
                studyContent.innerHTML = tabData.content;
            }
        }

        // --- SQL 실행 로직 ---
        function executeSql() {
            if (!db) return;
            const query = sqlInput.value;
            resultsContainer.innerHTML = ''; // Clear previous

            try {
                // db.exec() 반환: [ {columns:['a','b'], values:[[1,2],[3,4]]}, ... ]
                const resArray = db.exec(query);
                
                if (resArray && resArray.length > 0) {
                    // 마지막 질의 결과 가져오기
                    const lastResult = resArray[resArray.length - 1];
                    renderTable(lastResult.columns, lastResult.values);
                } else {
                    // SELECT가 아닌 명령 (INSERT, UPDATE 등)
                    if (query.trim().length > 0) {
                        renderSuccess('MySQL 명령어가 성공적으로 실행되었습니다.');
                    } else {
                        resultsContainer.innerHTML = `
                            <div class="text-gray-400 text-sm flex items-center justify-center h-full">
                                위에서 SQL을 작성하고 실행 버튼을 눌러보세요.
                            </div>`;
                    }
                }
            } catch (err) {
                showError(err.message);
            }
        }

        // --- 결과 테이블 렌더링 ---
        function renderTable(columns, values) {
            if (values.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-gray-500 text-sm italic flex items-center gap-2">
                        ${icons.info} 결과 행이 없습니다. (조회 조건에 맞는 데이터가 없음)
                    </div>`;
                return;
            }

            let theadHtml = columns.map(col => `<th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider border-b">${col}</th>`).join('');
            
            let tbodyHtml = values.map(row => {
                let rowHtml = row.map(val => {
                    const displayVal = val === null ? '<span class="text-gray-400 italic">NULL</span>' : String(val);
                    return `<td class="px-4 py-2 whitespace-nowrap text-sm text-gray-700">${displayVal}</td>`;
                }).join('');
                return `<tr class="hover:bg-blue-50 transition-colors border-b last:border-b-0">${rowHtml}</tr>`;
            }).join('');

            resultsContainer.innerHTML = `
                <div class="rounded border border-gray-200 shadow-sm overflow-hidden inline-block min-w-full">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>${theadHtml}</tr>
                        </thead>
                        <tbody class="bg-white">
                            ${tbodyHtml}
                        </tbody>
                    </table>
                </div>`;
        }

        // --- 에러 메세지 렌더링 ---
        function showError(msg) {
            resultsContainer.innerHTML = `
                <div class="flex items-start gap-2 p-3 bg-red-50 text-red-700 rounded border border-red-200">
                    ${icons.alert}
                    <div>
                        <h4 class="font-bold">SQL Error</h4>
                        <p class="text-sm font-mono mt-1">${msg}</p>
                    </div>
                </div>`;
        }

        // --- 성공 메세지 렌더링 ---
        function renderSuccess(msg) {
            resultsContainer.innerHTML = `
                <div class="flex items-center gap-2 text-green-600 font-semibold bg-green-50 p-3 rounded border border-green-200">
                    ${icons.checkLarge}
                    ${msg}
                </div>`;
        }

        // --- 앱 시작 ---
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
