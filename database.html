            navList.innerHTML = '';
            studyMaterials.forEach(item => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.onclick = () => setTab(item.id);
                
                const isActive = activeTab === item.id;
                btn.className = `w-full text-left px-6 py-3 transition-colors text-sm ${
                    isActive 
                        ? 'bg-slate-800 dark:bg-slate-800 text-white border-l-4 border-emerald-500 dark:border-emerald-400 font-bold' 
                        : 'text-slate-300 hover:bg-slate-800 dark:hover:bg-slate-800 hover:text-white border-l-4 border-transparent dark:border-transparent'
                }`;
                btn.innerHTML = item.title;
                li.appendChild(btn);
                navList.appendChild(li);
            });
        }

        // 탭 컨텐츠 변경
        function setTab(id) {
            activeTab = id;
            renderNav();
            const tabData = studyMaterials.find(item => item.id === id);
            if(tabData) {
                headerTitle.innerHTML = tabData.title;
                studyContent.innerHTML = tabData.content;
                
                // 애니메이션 리트리거
                studyContent.classList.remove('fade-in');
                void studyContent.offsetWidth; // DOM 재계산 유도
                studyContent.classList.add('fade-in');
            }
        }

        // SQL 실행 및 테이블 생성
        function executeSql() {
            if (!db) return;
            const query = sqlInput.value;
            resultsContainer.innerHTML = '';

            try {
                const resArray = db.exec(query);
                if (resArray.length > 0) {
                    const { columns, values } = resArray[resArray.length - 1];
                    let thead = columns.map(col => `<th class="px-4 py-2 text-left text-xs font-bold text-slate-500 dark:text-slate-400 border-b dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50">${col}</th>`).join('');
                    let tbody = values.map(row => `<tr>${row.map(val => `<td class="px-4 py-2 text-sm text-slate-700 dark:text-slate-300 border-b dark:border-slate-600">${val}</td>`).join('')}</tr>`).join('');
                    
                    resultsContainer.innerHTML = `
                        <div class="rounded border border-slate-200 dark:border-slate-700 overflow-x-auto">
                            <table class="min-w-full"><thead class="bg-slate-50 dark:bg-slate-700/50"><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>
                        </div>`;
                } else {
                    resultsContainer.innerHTML = `<div class="p-3 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded font-bold">✓ SQL 명령이 성공적으로 실행되었습니다.</div>`;
                }
            } catch (err) {
                resultsContainer.innerHTML = `<div class="p-3 bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 rounded border border-rose-200 dark:border-rose-800"><strong>Error:</strong> ${err.message}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
