<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 통합 학습 마스터리 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
    mermaid.initialize({
        startOnLoad: false, 
            theme: 'default',
            securityLevel: 'loose', // 렌더링 허용 범위 확장
            fontFamily: 'inherit' });
    </script>
    <script src="data.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 antialiased overflow-hidden flex h-screen">

    <aside class="w-64 bg-slate-900 dark:bg-slate-950 text-slate-300 flex-shrink-0 hidden md:flex flex-col shadow-xl z-20">
        <div class="p-6 bg-slate-950 dark:bg-black border-b border-slate-800" id="sidebar-header"></div>
        <nav class="flex-1 overflow-y-auto py-4"><ul class="space-y-1" id="sidebar-nav"></ul></nav>
        <div class="p-4 bg-slate-950 dark:bg-black text-xs text-center text-slate-500 border-t border-slate-800">Markdown Viewer</div>
    </aside>

    <div class="md:hidden fixed top-0 left-0 w-full bg-slate-900 text-white z-50 flex justify-between items-center p-4 shadow-md">
        <h1 class="text-xl font-bold truncate cursor-pointer" onclick="App.navigate('home')">Study Hub</h1>
        <select id="mobile-nav" class="bg-slate-800 text-white border border-slate-700 rounded p-2 outline-none text-sm max-w-[50%]"></select>
    </div>

    <main id="main-content" class="flex-1 overflow-y-auto p-6 md:p-10 pt-24 md:pt-10 relative flex flex-col">
        <div id="page-home" class="page-view max-w-5xl mx-auto w-full">
            <header class="mb-8 border-b border-slate-200 dark:border-slate-700 pb-4">
                <h2 class="text-3xl font-bold text-slate-800 dark:text-slate-100">📚 공부 자료 모음</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2">학습할 과목을 선택하세요. 새 폴더를 추가하면 자동으로 항목이 생성됩니다.</p>
            </header>
            
            <div id="home-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12"></div>
        </div>

        <div id="page-viewer" class="page-view hidden max-w-4xl mx-auto w-full h-full">
            <div class="bg-white dark:bg-slate-800 p-8 md:p-12 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 min-h-full">
                <header class="mb-8 border-b border-slate-200 dark:border-slate-700 pb-6">
                    <h2 id="viewer-title" class="text-3xl font-extrabold text-slate-800 dark:text-slate-100">문서 불러오는 중...</h2>
                </header>
                <article id="md-content" class="markdown-body fade-in"></article>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
